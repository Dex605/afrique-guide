<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Rating History — Global Brands</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-l:#E8C97A;--serif:'Playfair Display',serif;--sans:'Outfit',sans-serif;--black:#060608;--dark:#0D0D10;--cream:#F2EDE4;--muted:rgba(242,237,228,0.45);--border:rgba(201,168,76,0.15);--border2:rgba(255,255,255,0.07)}
body{font-family:var(--sans);background:var(--black);color:var(--cream);min-height:100vh;overflow-x:hidden}
nav{position:sticky;top:0;z-index:100;padding:12px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,6,8,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.nav-name{font-family:var(--serif);font-size:.96rem;color:var(--cream);font-weight:700}
.nav-right{display:flex;gap:8px}
.btn-sm{padding:6px 14px;font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;border-radius:3px;cursor:pointer;font-family:var(--sans);text-decoration:none;border:1px solid var(--border2);color:var(--muted);background:transparent;transition:all .2s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.main{padding:36px 32px 60px;max-width:760px;margin:0 auto}
h1{font-family:var(--serif);font-size:2rem;font-weight:700;margin-bottom:5px}
.page-sub{font-size:.78rem;color:var(--muted);margin-bottom:26px}
/* summary cards */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.sc{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:6px;padding:14px 16px}
.sc-label{font-size:.52rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.sc-val{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--gold-l)}
.sc-sub{font-size:.58rem;color:var(--muted);margin-top:2px}
/* round filter */
.round-filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.rf{padding:6px 16px;border:1px solid var(--border2);background:transparent;color:var(--muted);border-radius:2px;font-family:var(--sans);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.rf.active,.rf:hover{background:var(--gold);color:#000;border-color:var(--gold)}
/* rating list */
.rating-list{display:flex;flex-direction:column;gap:8px}
.rating-item{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:6px;padding:12px 16px;display:flex;align-items:center;gap:14px;transition:background .15s}
.rating-item:hover{background:rgba(255,255,255,.05)}
.ri-num{font-size:.7rem;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.ri-logo{width:36px;height:36px;object-fit:contain;flex-shrink:0;background:rgba(255,255,255,.04);border-radius:4px;padding:4px}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:.84rem;font-weight:600;color:var(--cream);margin-bottom:2px}
.ri-meta{font-size:.62rem;color:var(--muted)}
.ri-stars{font-size:.72rem;color:var(--gold);flex-shrink:0}
.ri-earn{font-size:.82rem;font-weight:600;color:#4caf50;flex-shrink:0;min-width:80px;text-align:right}
.ri-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;flex-shrink:0}
.ri-badge.r1{background:rgba(201,168,76,.12);color:#a07830;border:1px solid rgba(201,168,76,.2)}
.ri-badge.r2{background:rgba(82,113,224,.12);color:#5271e0;border:1px solid rgba(82,113,224,.2)}
.ri-badge.r3{background:rgba(156,52,224,.12);color:#9B34E0;border:1px solid rgba(156,52,224,.2)}
.ri-badge.sp{background:rgba(255,80,80,.12);color:#ff5050;border:1px solid rgba(255,80,80,.2)}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:.82rem}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
@media(max-width:600px){.summary{grid-template-columns:1fr 1fr}.ri-earn{display:none}}
  </style>
</head>
<body>
<nav>
  <a href="home.html" class="nav-logo">
    <span style="font-size:1.2rem">⭐</span>
    <span class="nav-name">Rating History</span>
  </a>
  <div class="nav-right">
    <a href="home.html" class="btn-sm">Home</a>
    <a href="rate.html" class="btn-sm" style="background:rgba(201,168,76,.1);color:var(--gold);border-color:var(--border)">Rate Brands</a>
    <a href="wallet.html" class="btn-sm">Wallet</a>
  </div>
</nav>

<div class="main">
  <h1>⭐ Rating History</h1>
  <p class="page-sub">All brands you have rated, grouped by round</p>

  <!-- Summary cards -->
  <div class="summary">
    <div class="sc"><div class="sc-label">Total Rated</div><div class="sc-val" id="sumTotal">—</div><div class="sc-sub">out of 96</div></div>
    <div class="sc"><div class="sc-label">Total Earned</div><div class="sc-val" id="sumEarned">—</div><div class="sc-sub">from ratings</div></div>
    <div class="sc"><div class="sc-label">Current Round</div><div class="sc-val" id="sumRound">—</div><div class="sc-sub">of 3 rounds</div></div>
    <div class="sc"><div class="sc-label">Remaining</div><div class="sc-val" id="sumRemaining">—</div><div class="sc-sub">brands left</div></div>
  </div>

  <!-- Round filter -->
  <div class="round-filters">
    <button class="rf active" onclick="filterRound('all',this)">All Rounds</button>
    <button class="rf" onclick="filterRound('1',this)">Round 1</button>
    <button class="rf" onclick="filterRound('2',this)">Round 2</button>
    <button class="rf" onclick="filterRound('3',this)">Round 3</button>
  </div>

  <!-- List -->
  <div id="ratingList" class="rating-list">
    <div class="empty"><div class="empty-icon">⭐</div>Loading your rating history...</div>
  </div>
</div>

<script src="brands.js?v=1780152113"></script>
<script src="gb_shared.js?v=1780152113"></script>
<script src="supabase.js?v=1780152113"></script>
<script>
let user={}, allRatings=[], activeFilter='all';

function fmt(n){ return gbFmt(n,user); }

async function init(){
  const cached=JSON.parse(localStorage.getItem('gb_user')||'{}');
  if(!cached.email){ location.href='signin.html'; return; }
  const fresh=await sb.getUser(cached.email);
  if(!fresh){ location.href='signin.html'; return; }
  user=fresh;
  localStorage.setItem('gb_user',JSON.stringify(user));

  const tc=user.tasks_completed||0;
  const round=tc<32?1:tc<64?2:3;

  document.getElementById('sumTotal').textContent=tc;
  document.getElementById('sumEarned').textContent=fmt(user.earnings||0);
  document.getElementById('sumRound').textContent=round;
  document.getElementById('sumRemaining').textContent=96-tc;

  // Load earning transactions
  const txs=await sb.getTransactions(user.email);
  allRatings=(txs||[]).filter(t=>t.type==='earning').reverse();
  renderList();
}

function getRound(idx){
  if(idx<32)return '1';
  if(idx<64)return '2';
  return '3';
}

function filterRound(r,btn){
  activeFilter=r;
  document.querySelectorAll('.rf').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList(){
  const list=document.getElementById('ratingList');
  const tc=user.tasks_completed||0;

  // Build rated brands list from BRANDS array + transactions
  // Match earning transactions to brand order
  const ratedBrands=BRANDS.slice(0,tc);
  const txsByOrder=allRatings.slice().reverse(); // oldest first = brand order

  if(ratedBrands.length===0){
    list.innerHTML=`<div class="empty"><div class="empty-icon">⭐</div><div>You haven't rated any brands yet.</div><a href="rate.html" style="display:inline-block;margin-top:14px;padding:9px 20px;background:var(--gold);color:#000;border-radius:3px;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-decoration:none">Start Rating →</a></div>`;
    return;
  }

  const filtered=ratedBrands.filter((_,i)=>activeFilter==='all'||getRound(i)===activeFilter);

  if(filtered.length===0){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🔒</div><div>No brands rated in this round yet.</div></div>`;
    return;
  }

  list.innerHTML=filtered.map((b,fi)=>{
    // Find the actual index in ratedBrands
    const globalIdx=ratedBrands.indexOf(b);
    const r=getRound(globalIdx);
    const tx=txsByOrder[globalIdx];
    const earn=tx?tx.amount:0;
    const isSpecial=earn>0&&txsByOrder[globalIdx]&&(earn>10||r==='2');
    const badgeClass=isSpecial&&r==='2'?'sp':r==='1'?'r1':r==='2'?'r2':'r3';
    const badgeLabel=isSpecial&&r==='2'?'Special':r==='1'?'Round 1':r==='2'?'Round 2':'Round 3';
    const stars='★'.repeat(Math.round(b.rating))+'☆'.repeat(5-Math.round(b.rating));
    return `<div class="rating-item">
      <span class="ri-num">${globalIdx+1}</span>
      <img class="ri-logo" src="${b.logo}" alt="${b.name}" onerror="this.style.display='none'"/>
      <div class="ri-info">
        <div class="ri-name">${b.name}</div>
        <div class="ri-meta">${b.sector} · ${b.founded}</div>
      </div>
      <span class="ri-stars">${stars}</span>
      <span class="ri-badge ${badgeClass}">${badgeLabel}</span>
      <span class="ri-earn">+${fmt(earn)}</span>
    </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
