<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – Afrique Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#C9A84C;--gold-light:#E2C47A;--black:#080808;--white:#F7F3EE;--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1)}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white)}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:url('https://images.unsplash.com/photo-1573164574230-db1d5e960238?w=1600&q=80') center/cover no-repeat;filter:brightness(0.1) blur(10px);transform:scale(1.05);pointer-events:none}
    .card{position:relative;z-index:1;background:rgba(11,11,11,0.94);border:1px solid var(--border);border-radius:6px;padding:40px 44px;width:100%;max-width:420px;backdrop-filter:blur(20px)}
    .logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:28px}
    .logo-em{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:0.95rem;color:var(--gold);font-weight:700}
    .logo-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--white)}
    h1{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;margin-bottom:5px}
    .subtitle{font-size:0.8rem;color:rgba(247,243,238,0.45);margin-bottom:28px;font-weight:300}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(247,243,238,0.5);margin-bottom:6px}
    input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:3px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s}
    input:focus{border-color:var(--gold)}
    .err{background:rgba(139,26,26,0.2);border:1px solid rgba(139,26,26,0.4);border-radius:3px;padding:9px 13px;font-size:0.76rem;color:#ff8080;margin-bottom:14px;display:none}
    .btn-submit{width:100%;padding:13px;background:var(--gold);color:var(--black);border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background 0.2s;margin-top:6px}
    .btn-submit:hover{background:var(--gold-light)}
    .signup-link{text-align:center;margin-top:18px;font-size:0.76rem;color:rgba(247,243,238,0.42)}
    .signup-link a{color:var(--gold);text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo-wrap">
    <div class="logo-em">AG</div>
    <span class="logo-name">Afrique Guide</span>
  </a>
  <h1>Welcome Back</h1>
  <p class="subtitle">Sign in to continue rating and earning</p>
  <div class="err" id="err">Invalid email or password.</div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Your password"/>
  </div>
  <button class="btn-submit" onclick="handleSignin()">Sign In</button>
  <div class="signup-link">Don't have an account? <a href="signup.html">Sign Up</a></div>
</div>
<script>
function handleSignin(){
  const email=document.getElementById('email').value.trim();
  const stored=localStorage.getItem('ag_user');
  if(!stored){document.getElementById('err').style.display='block';return}
  const user=JSON.parse(stored);
  if(user.email===email){
    user.lastSeen=new Date().toISOString();
    localStorage.setItem('ag_user',JSON.stringify(user));
    localStorage.setItem('ag_logged_in','true');
    // Update users list
    const users=JSON.parse(localStorage.getItem('ag_users')||'[]');
    const idx=users.findIndex(u=>u.email===email);
    if(idx>=0){users[idx].lastSeen=user.lastSeen;localStorage.setItem('ag_users',JSON.stringify(users))}
    window.location.href='home.html';
  } else {document.getElementById('err').style.display='block'}
}
</script>
</body>
</html>
