<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — Global Brands</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-l:#E8C97A;--black:#060608;--dark:#0D0D10;--cream:#F2EDE4;--muted:rgba(242,237,228,0.45);--border:rgba(201,168,76,0.15);--serif:'Playfair Display',serif;--sans:'Outfit',sans-serif}
body{font-family:var(--sans);background:var(--black);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 40%,rgba(201,168,76,0.05),transparent 60%);pointer-events:none}
.card{position:relative;z-index:1;background:rgba(13,13,16,0.96);border:1px solid var(--border);border-radius:8px;padding:42px 46px;width:100%;max-width:420px;backdrop-filter:blur(20px)}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:30px}
.logo-name{font-family:var(--serif);font-size:1.1rem;color:var(--cream);font-weight:700}
h1{font-family:var(--serif);font-size:1.9rem;font-weight:700;margin-bottom:5px}
.subtitle{font-size:.8rem;color:var(--muted);margin-bottom:28px;font-weight:300}
.form-group{margin-bottom:16px}
label{display:block;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(242,237,228,0.45);margin-bottom:6px}
input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:3px;color:var(--cream);font-family:var(--sans);font-size:.88rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--gold)}
.err{background:rgba(139,26,26,.2);border:1px solid rgba(139,26,26,.4);border-radius:3px;padding:9px 13px;font-size:.76rem;color:#ff8080;margin-bottom:14px;display:none}
.btn-submit{width:100%;padding:13px;background:var(--gold);color:var(--black);border:none;border-radius:3px;font-family:var(--sans);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .2s;margin-top:6px}
.btn-submit:hover{background:var(--gold-l)}
.signup-link{text-align:center;margin-top:18px;font-size:.76rem;color:var(--muted)}
.signup-link a{color:var(--gold);text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo-wrap"><span style="font-size:1.4rem">🌍</span><span class="logo-name">Global Brands</span></a>
  <h1>Welcome Back</h1>
  <p class="subtitle">Sign in to continue rating and earning</p>
  <div class="err" id="err">Invalid email or password.</div>
  <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com"/></div>
  <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Your password"/></div>
  <button class="btn-submit" onclick="handleSignin()">Sign In</button>
  <div class="signup-link">Don't have an account? <a href="signup.html">Sign Up</a></div>
</div>
<script>
function handleSignin(){
  const email=document.getElementById('email').value.trim();
  const stored=localStorage.getItem('gb_user');
  if(!stored){document.getElementById('err').style.display='block';return}
  const user=JSON.parse(stored);
  if(user.email===email){
    user.lastSeen=new Date().toISOString();
    localStorage.setItem('gb_user',JSON.stringify(user));
    localStorage.setItem('gb_login','true');
    const users=JSON.parse(localStorage.getItem('gb_users')||'[]');
    const idx=users.findIndex(u=>u.email===email);
    if(idx>=0){users[idx].lastSeen=user.lastSeen;localStorage.setItem('gb_users',JSON.stringify(users))}
    window.location.href='home.html';
  } else {document.getElementById('err').style.display='block'}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')handleSignin()});
</script>
</body>
</html>
