<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Brands – Afrique Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#C9A84C;--gold-light:#E2C47A;--black:#080808;--white:#F7F3EE;--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1)}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white)}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:url('https://images.unsplash.com/photo-1611348586804-61bf6c080437?w=1600&q=80') center/cover no-repeat;filter:brightness(0.07) blur(12px);transform:scale(1.05);pointer-events:none}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:rgba(8,8,8,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-em{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:0.9rem;color:var(--gold);font-weight:700}
    .logo-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--white)}
    .nav-right{display:flex;gap:10px;align-items:center}
    .btn-sm{padding:6px 14px;font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;transition:all 0.2s}
    .btn-ghost-sm{background:rgba(255,255,255,0.05);color:var(--white);border:1px solid var(--border)}
    .btn-ghost-sm:hover{border-color:var(--gold);color:var(--gold)}
    .btn-gold-sm{background:var(--gold);color:var(--black);border:1px solid var(--gold);font-weight:500}

    .main{padding:90px 40px 60px;max-width:1200px;margin:0 auto;position:relative;z-index:1}
    .page-header{margin-bottom:40px}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:600;margin-bottom:6px}
    .page-sub{font-size:0.82rem;color:rgba(247,243,238,0.45);font-weight:300}

    .filter-bar{display:flex;gap:10px;margin-bottom:32px;flex-wrap:wrap}
    .filter-btn{padding:7px 18px;border:1px solid var(--border);background:transparent;color:rgba(247,243,238,0.55);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
    .filter-btn:hover,.filter-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold)}

    .brands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
    .brand-card{background:var(--glass);border:1px solid var(--border);border-radius:4px;padding:0;overflow:hidden;transition:transform 0.3s,border-color 0.3s;cursor:pointer}
    .brand-card:hover{transform:translateY(-4px);border-color:var(--gold)}
    .brand-card-top{padding:24px 18px;text-align:center;border-bottom:1px solid var(--border)}
    .brand-logo{width:80px;height:60px;object-fit:contain;margin:0 auto 10px;display:block}
    .brand-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;margin-bottom:4px}
    .brand-country{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
    .brand-sector{font-size:0.62rem;color:rgba(247,243,238,0.38);font-weight:300}
    .brand-card-bottom{padding:12px 18px;display:flex;justify-content:space-between;align-items:center}
    .brand-rating{font-size:0.72rem;color:var(--gold)}
    .brand-reviews{font-size:0.65rem;color:rgba(247,243,238,0.35)}
    .btn-read{font-size:0.64rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);text-decoration:none;transition:color 0.2s}
    .btn-read:hover{color:var(--gold-light)}

    /* BRAND STORY MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px)}
    .modal-overlay.open{display:flex}
    .modal{background:#0d0d0d;border:1px solid var(--border);border-radius:8px;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;position:relative}
    .modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:rgba(255,255,255,0.35);font-size:1.4rem;cursor:pointer;z-index:10}
    .modal-close:hover{color:var(--white)}
    .modal-header{padding:32px 32px 20px;display:flex;align-items:center;gap:20px;border-bottom:1px solid var(--border)}
    .modal-logo{width:72px;height:72px;object-fit:contain;flex-shrink:0}
    .modal-brand-name{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;margin-bottom:4px}
    .modal-meta{font-size:0.7rem;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase}
    .modal-body{padding:28px 32px}
    .modal-story{font-size:0.84rem;color:rgba(247,243,238,0.65);line-height:1.9;font-weight:300;margin-bottom:24px}
    .modal-stars{font-size:1.1rem;color:var(--gold);margin-bottom:6px}
    .modal-reviews{font-size:0.7rem;color:rgba(247,243,238,0.35)}
    .modal-cta{display:inline-block;margin-top:20px;padding:12px 28px;background:var(--gold);color:var(--black);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;text-decoration:none;cursor:pointer;border:none}

    @media(max-width:640px){
      nav{padding:12px 18px}
      .main{padding:74px 18px 40px}
      .modal-header{flex-direction:column;text-align:center}
      .modal-body{padding:20px}
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo-wrap">
    <div class="logo-em">AG</div>
    <span class="logo-name">Afrique Guide</span>
  </a>
  <div class="nav-right">
    <a href="home.html" class="btn-sm btn-ghost-sm">Dashboard</a>
    <a href="wallet.html" class="btn-sm btn-gold-sm">Wallet</a>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <h1 class="page-title">All 96 Brands</h1>
    <p class="page-sub">Click any brand to read its full story</p>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterBrands('all',this)">All Countries</button>
    <button class="filter-btn" onclick="filterBrands('Kenya',this)">🇰🇪 Kenya</button>
    <button class="filter-btn" onclick="filterBrands('Tanzania',this)">🇹🇿 Tanzania</button>
    <button class="filter-btn" onclick="filterBrands('Uganda',this)">🇺🇬 Uganda</button>
  </div>
  <div class="brands-grid" id="brandsGrid"></div>
</div>

<!-- Brand story modal -->
<div class="modal-overlay" id="brandModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-header">
      <img class="modal-logo" id="mLogo" src="" alt="">
      <div>
        <div class="modal-brand-name" id="mName"></div>
        <div class="modal-meta" id="mMeta"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-stars" id="mStars"></div>
      <div class="modal-reviews" id="mReviews"></div>
      <p class="modal-story" id="mStory"></p>
      <a href="home.html" class="modal-cta">Rate This Brand →</a>
    </div>
  </div>
</div>

<script src="brands.js"></script>
<script>
let currentFilter = 'all';

function renderBrands(filter){
  const grid = document.getElementById('brandsGrid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? BRANDS : BRANDS.filter(b => b.country.includes(filter));
  filtered.forEach(b=>{
    const stars = '★'.repeat(Math.round(b.rating)) + '☆'.repeat(5-Math.round(b.rating));
    const div = document.createElement('div');
    div.className = 'brand-card';
    div.id = 'brand-'+b.id;
    div.onclick = () => openModal(b);
    div.innerHTML = `
      <div class="brand-card-top">
        <img class="brand-logo" src="${b.logo}" alt="${b.name}" onerror=\"logoFail(this,b.fallback,b.color,b.initials)\">
        <div class="brand-name">${b.name}</div>
        <div class="brand-country">${b.country}</div>
        <div class="brand-sector">${b.sector}</div>
      </div>
      <div class="brand-card-bottom">
        <div>
          <div class="brand-rating">${stars} ${b.rating}</div>
          <div class="brand-reviews">${b.reviews.toLocaleString()} reviews</div>
        </div>
        <span class="btn-read">Read More →</span>
      </div>
    `;
    grid.appendChild(div);
  });
}

function filterBrands(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBrands(f);
}

function openModal(b){
  document.getElementById('mLogo').src = b.logo;
      document.getElementById('mLogo').onerror=function(){logoFail(this,b.fallback,b.color,b.initials);};
      document.getElementById('mLogo').onerror=function(){this.onerror=null;this.src=b.fallback;};
  document.getElementById('mName').textContent = b.name;
  document.getElementById('mMeta').textContent = b.country + ' · ' + b.sector;
  document.getElementById('mStars').textContent = '★'.repeat(Math.round(b.rating)) + '☆'.repeat(5-Math.round(b.rating)) + ' ' + b.rating;
  document.getElementById('mReviews').textContent = b.reviews.toLocaleString() + ' customer reviews';
  document.getElementById('mStory').textContent = b.story;
  document.getElementById('brandModal').classList.add('open');
}
function closeModal(){document.getElementById('brandModal').classList.remove('open')}
document.getElementById('brandModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

// Check anchor
renderBrands('all');
if(location.hash){
  const el = document.querySelector(location.hash);
  if(el){setTimeout(()=>el.scrollIntoView({behavior:'smooth'}),300)}
}
</script>
</body>
</html>
