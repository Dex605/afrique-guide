<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Afrique Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C; --gold-light: #E2C47A; --black: #080808;
      --dark: #111111; --white: #F7F3EE;
      --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1);
    }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--white); }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background: url('https://images.unsplash.com/photo-1547592180-85f173990554?w=1600&q=80') center/cover no-repeat;
      filter: brightness(0.12); pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(11,11,11,0.92);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      padding: 44px 48px;
      width: 100%; max-width: 480px;
      backdrop-filter: blur(20px);
    }

    .logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 32px; }
    .logo-emblem { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--gold); font-weight: 700; }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--white); letter-spacing: 0.05em; }

    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; margin-bottom: 6px; }
    .subtitle { font-size: 0.82rem; color: rgba(247,243,238,0.5); margin-bottom: 30px; font-weight: 300; }

    .bonus-banner {
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 4px; padding: 14px 18px;
      margin-bottom: 28px; text-align: center;
    }
    .bonus-banner .bonus-label { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
    .bonus-banner .bonus-amount { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--gold-light); font-weight: 700; }
    .bonus-banner .bonus-note { font-size: 0.7rem; color: rgba(247,243,238,0.45); margin-top: 2px; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(247,243,238,0.55); margin-bottom: 7px; font-weight: 400; }
    input, select {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 3px; color: var(--white);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: var(--gold); }
    select option { background: #111; color: var(--white); }

    .phone-row { display: flex; gap: 10px; }
    .phone-code { width: 140px; flex-shrink: 0; }
    .phone-num { flex: 1; }

    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--gold); color: var(--black);
      border: none; border-radius: 3px;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 500; cursor: pointer;
      transition: background 0.2s; margin-top: 8px;
    }
    .btn-submit:hover { background: var(--gold-light); }

    .signin-link { text-align: center; margin-top: 20px; font-size: 0.78rem; color: rgba(247,243,238,0.45); }
    .signin-link a { color: var(--gold); text-decoration: none; }

    .currency-display {
      background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 3px; padding: 10px 14px; margin-top: -8px; margin-bottom: 18px;
      font-size: 0.78rem; color: var(--gold-light); display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <a href="index.html" class="logo-wrap">
    <div class="logo-emblem">AG</div>
    <span class="logo-name">Afrique Guide</span>
  </a>

  <h1>Create Account</h1>
  <p class="subtitle">Join Africa's premier dish rating community</p>

  <div class="bonus-banner">
    <div class="bonus-label">New Member Welcome Bonus</div>
    <div class="bonus-amount" id="bonusDisplay">KES 200</div>
    <div class="bonus-note">Credited instantly on signup — no deposit required</div>
  </div>

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" placeholder="Your full name" id="fullName"/>
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" placeholder="you@example.com" id="email"/>
  </div>

  <div class="form-group">
    <label>Country</label>
    <select id="countrySelect" onchange="updateCountry()">
      <option value="">Select your country</option>
      <option value="KE">🇰🇪 Kenya</option>
      <option value="TZ">🇹🇿 Tanzania</option>
      <option value="NG">🇳🇬 Nigeria</option>
      <option value="GH">🇬🇭 Ghana</option>
      <option value="UG">🇺🇬 Uganda</option>
      <option value="ZA">🇿🇦 South Africa</option>
      <option value="ET">🇪🇹 Ethiopia</option>
      <option value="CM">🇨🇲 Cameroon</option>
      <option value="SN">🇸🇳 Senegal</option>
      <option value="CI">🇨🇮 Côte d'Ivoire</option>
      <option value="EG">🇪🇬 Egypt</option>
      <option value="MA">🇲🇦 Morocco</option>
      <option value="AO">🇦🇴 Angola</option>
      <option value="ZW">🇿🇼 Zimbabwe</option>
      <option value="RW">🇷🇼 Rwanda</option>
    </select>
  </div>

  <div class="currency-display" id="currencyDisplay"></div>

  <div class="form-group">
    <label>Phone Number</label>
    <div class="phone-row">
      <select class="phone-code" id="phoneCode">
        <option value="+254">🇰🇪 +254</option>
        <option value="+255">🇹🇿 +255</option>
        <option value="+234">🇳🇬 +234</option>
        <option value="+233">🇬🇭 +233</option>
        <option value="+256">🇺🇬 +256</option>
        <option value="+27">🇿🇦 +27</option>
        <option value="+251">🇪🇹 +251</option>
        <option value="+237">🇨🇲 +237</option>
        <option value="+221">🇸🇳 +221</option>
        <option value="+225">🇨🇮 +225</option>
        <option value="+20">🇪🇬 +20</option>
        <option value="+212">🇲🇦 +212</option>
        <option value="+244">🇦🇴 +244</option>
        <option value="+263">🇿🇼 +263</option>
        <option value="+250">🇷🇼 +250</option>
      </select>
      <input type="tel" class="phone-num" placeholder="7XX XXX XXX" id="phone"/>
    </div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" placeholder="Create a strong password" id="password"/>
  </div>

  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" placeholder="Repeat your password" id="confirmPassword"/>
  </div>

  <button class="btn-submit" onclick="handleSignup()">Create Account & Claim Bonus</button>

  <div class="signin-link">Already have an account? <a href="signin.html">Sign In</a></div>
</div>

<script>
  const countries = {
    KE: { name: 'Kenya', currency: 'KES', code: '+254', bonus: 200, symbol: 'KES', flag: '🇰🇪' },
    TZ: { name: 'Tanzania', currency: 'TZS', code: '+255', bonus: 4800, symbol: 'TZS', flag: '🇹🇿' },
    NG: { name: 'Nigeria', currency: 'NGN', code: '+234', bonus: 1800, symbol: 'NGN', flag: '🇳🇬' },
    GH: { name: 'Ghana', currency: 'GHS', code: '+233', bonus: 17, symbol: 'GHS', flag: '🇬🇭' },
    UG: { name: 'Uganda', currency: 'UGX', code: '+256', bonus: 7200, symbol: 'UGX', flag: '🇺🇬' },
    ZA: { name: 'South Africa', currency: 'ZAR', code: '+27', bonus: 20, symbol: 'ZAR', flag: '🇿🇦' },
    ET: { name: 'Ethiopia', currency: 'ETB', code: '+251', bonus: 290, symbol: 'ETB', flag: '🇪🇹' },
    CM: { name: 'Cameroon', currency: 'XAF', code: '+237', bonus: 3100, symbol: 'XAF', flag: '🇨🇲' },
    SN: { name: 'Senegal', currency: 'XOF', code: '+221', bonus: 3100, symbol: 'XOF', flag: '🇸🇳' },
    CI: { name: "Côte d'Ivoire", currency: 'XOF', code: '+225', bonus: 3100, symbol: 'XOF', flag: '🇨🇮' },
    EG: { name: 'Egypt', currency: 'EGP', code: '+20', bonus: 1500, symbol: 'EGP', flag: '🇪🇬' },
    MA: { name: 'Morocco', currency: 'MAD', code: '+212', bonus: 550, symbol: 'MAD', flag: '🇲🇦' },
    AO: { name: 'Angola', currency: 'AOA', code: '+244', bonus: 28000, symbol: 'AOA', flag: '🇦🇴' },
    ZW: { name: 'Zimbabwe', currency: 'USD', code: '+263', bonus: 1.50, symbol: 'USD', flag: '🇿🇼' },
    RW: { name: 'Rwanda', currency: 'RWF', code: '+250', bonus: 2600, symbol: 'RWF', flag: '🇷🇼' },
  };

  function updateCountry() {
    const code = document.getElementById('countrySelect').value;
    const display = document.getElementById('currencyDisplay');
    const bonusDisplay = document.getElementById('bonusDisplay');
    const phoneCode = document.getElementById('phoneCode');

    if (!code) { display.style.display = 'none'; return; }

    const c = countries[code];
    display.style.display = 'block';
    display.textContent = `Your account will use ${c.currency} — Welcome bonus: ${c.symbol} ${c.bonus.toLocaleString()}`;
    bonusDisplay.textContent = `${c.symbol} ${c.bonus.toLocaleString()}`;

    for (let i = 0; i < phoneCode.options.length; i++) {
      if (phoneCode.options[i].value === c.code) {
        phoneCode.selectedIndex = i; break;
      }
    }
  }

  function handleSignup() {
    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const country = document.getElementById('countrySelect').value;
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!name || !email || !country || !phone || !password) {
      alert('Please fill in all fields.'); return;
    }
    if (password !== confirm) {
      alert('Passwords do not match.'); return;
    }

    const c = countries[country];
    const userData = {
      name, email, country, phone: document.getElementById('phoneCode').value + phone,
      currency: c.currency, bonus: c.bonus, balance: c.bonus,
      earnings: 0, round: 1, tasksCompleted: 0
    };

    localStorage.setItem('ag_user', JSON.stringify(userData));
    localStorage.setItem('ag_logged_in', 'true');
    window.location.href = 'home.html';
  }
</script>
</body>
</html>
