*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-l:#E8C97A;--black:#04040A;--dark:#0A0A12;--cream:#EEE8DC;--muted:rgba(238,232,220,0.45);--border:rgba(201,168,76,0.15);--serif:'Playfair Display',serif;--sans:'Outfit',sans-serif}
html,body{height:100%}
body{font-family:var(--sans);background:var(--black);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow-x:hidden}
.bg-slide{position:fixed;inset:0;z-index:0}
.bg-overlay{position:fixed;inset:0;z-index:1;background:rgba(4,4,10,.82)}
.bg-grid{position:fixed;inset:0;z-index:2;pointer-events:none;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:80px 80px}
.card{position:relative;z-index:10;background:rgba(10,10,18,.92);border:1px solid var(--border);border-radius:8px;padding:40px 46px;width:100%;max-width:490px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);margin:20px 0}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:28px}
.logo-globe{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.07)}
.logo-globe svg{width:18px;height:18px}
.logo-name{font-family:var(--serif);font-size:1rem;color:var(--cream);font-weight:700}
.logo-tag{font-size:.46rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
h1{font-family:var(--serif);font-size:2rem;font-weight:700;margin-bottom:4px}
.subtitle{font-size:.8rem;color:var(--muted);margin-bottom:26px;font-weight:300;line-height:1.6}
.form-group{margin-bottom:14px}
label{display:block;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(238,232,220,.4);margin-bottom:7px}
input,select{width:100%;padding:11px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:3px;color:var(--cream);font-family:var(--sans);font-size:.87rem;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--gold)}
select option{background:#111;color:var(--cream)}
.phone-row{display:flex;gap:8px}
.phone-code{width:155px;flex-shrink:0}
.currency-note{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:3px;padding:8px 12px;margin-bottom:12px;font-size:.72rem;color:var(--gold-l);line-height:1.5;display:none}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(238,232,220,.35);transition:color .2s;padding:4px;display:flex;align-items:center}
.pw-toggle:hover{color:var(--gold)}
.btn-submit{width:100%;padding:13px;background:var(--gold);color:var(--black);border:none;border-radius:3px;font-family:var(--sans);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .2s;margin-top:6px}
.btn-submit:hover{background:var(--gold-l)}
.alt-link{text-align:center;margin-top:18px;font-size:.76rem;color:var(--muted)}
.alt-link a{color:var(--gold);text-decoration:none}
  </style>

function updateCountry() {
  const code = document.getElementById('countrySelect').value;
  const c = countries[code];
  const note = document.getElementById('currencyNote');
  if (!c) { note.style.display = 'none'; return; }
  note.style.display = 'block';
  note.textContent = 'Account currency: ' + c.currency + ' · Withdraw via: ' + c.pay;
  const pc = document.getElementById('phoneCode');
  for (let i = 0; i < pc.options.length; i++) {
    if (pc.options[i].value === c.code) { pc.selectedIndex = i; break; }
  }
}

function togglePw(inputId, iconId) {
  const inp = document.getElementById(inputId);
  const ico = document.getElementById(iconId);
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    inp.type = 'password';
    ico.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
}

function handleSignup() {
  const name = document.getElementById('fullName').value.trim();
  const email = document.getElementById('email').value.trim();
  const countryCode = document.getElementById('countrySelect').value;
  const yearOfBirth = document.getElementById('yearOfBirth').value;
  const phone = document.getElementById('phone').value.trim();
  const pwd = document.getElementById('password').value;
  const cpwd = document.getElementById('confirmPassword').value;
  if (!name || !email || !countryCode || !yearOfBirth || !phone || !pwd) { alert('Please fill in all fields.'); return; }
  if (pwd !== cpwd) { alert('Passwords do not match.'); return; }
  const c = countries[countryCode] || {currency:'USD',symbol:'$',bonus:5,pay:'Wallet'};
  // Generate unique invite code and avatar
  const inviteCode = gbGenInviteCode();
  const avatarSeed = Math.floor(Math.random()*10);
  const av = gbGenAvatar(name, avatarSeed);
  const user = {
    name, email, country: countryCode,
    yearOfBirth,
    phone: document.getElementById('phoneCode').value + phone,
    currency: c.currency, symbol: c.symbol, bonus: c.bonus,
    balance: 0, earnings: 0, bonusRemaining: c.bonus, bonusUsed: 0,
    tasksCompleted: 0,
    inviteCode,
    avatarColor: av.color,
    avatarInitials: av.initials,
    avatar: av.svg,
    joinedAt: new Date().toISOString(),
    lastSeen: new Date().toISOString()
  };
  localStorage.setItem('gb_user', JSON.stringify(user));
  localStorage.setItem('gb_login', 'true');
  const users = JSON.parse(localStorage.getItem('gb_users') || '[]');
  const idx = users.findIndex(u => u.email === email);
  if (idx >= 0) users[idx] = user; else users.push(user);
  localStorage.setItem('gb_users', JSON.stringify(users));
  window.location.href = 'home.html';
}

  {bottom:'6%',left:'6%',w:'200px',h:'138px'},{bottom:'6%',right:'6%',w:'200px',h:'138px'},
  {top:'2%',left:'44%',w:'220px',h:'150px'},{bottom:'5%',left:'36%',w:'190px',h:'130px'},
];
const bgImgs = positions.map(p => {
  const img = document.createElement('img');
  let s = `position:absolute;object-fit:contain;pointer-events:none;filter:blur(32px) brightness(.28) saturate(1.8);transition:opacity 1.4s ease;opacity:0;width:${p.w};height:${p.h};`;
  if (p.top) s += `top:${p.top};`; if (p.bottom) s += `bottom:${p.bottom};`;
  if (p.left) s += `left:${p.left};`; if (p.right) s += `right:${p.right};`;
  img.style.cssText = s; bgSlide.appendChild(img); return img;
});
function setBgBrands() {
  const shuffled = [...BRANDS].sort(() => Math.random() - 0.5).slice(0, bgImgs.length);
  shuffled.forEach((b, i) => { bgImgs[i].src = b.logo; bgImgs[i].onerror = function(){ logoFail(this, b.fallback, b.color, b.initials); }; });
}
setBgBrands();
setTimeout(() => bgImgs.forEach(img => img.style.opacity = '1'), 300);
setInterval(() => {
  bgImgs.forEach(img => img.style.opacity = '0');
  setTimeout(() => { setBgBrands(); bgImgs.forEach(img => img.style.opacity = '1'); }, 1500);
}, 5000);
</script>
