<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Afrique Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#C9A84C;--gold-light:#E2C47A;--black:#080808;--white:#F7F3EE;--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1)}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white)}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:url('https://images.unsplash.com/photo-1611348586804-61bf6c080437?w=1600&q=80') center/cover no-repeat;filter:brightness(0.12) blur(10px);transform:scale(1.05);pointer-events:none}
    .card{position:relative;z-index:1;background:rgba(11,11,11,0.94);border:1px solid var(--border);border-radius:6px;padding:40px 44px;width:100%;max-width:480px;backdrop-filter:blur(20px)}
    .logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:28px}
    .logo-em{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:0.95rem;color:var(--gold);font-weight:700}
    .logo-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--white)}
    h1{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;margin-bottom:5px}
    .subtitle{font-size:0.8rem;color:rgba(247,243,238,0.45);margin-bottom:26px;font-weight:300}
    .bonus-banner{background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));border:1px solid rgba(201,168,76,0.3);border-radius:4px;padding:12px 16px;margin-bottom:24px;text-align:center}
    .bonus-label{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
    .bonus-amount{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--gold-light);font-weight:700}
    .bonus-note{font-size:0.66rem;color:rgba(247,243,238,0.4);margin-top:2px}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(247,243,238,0.5);margin-bottom:6px}
    input,select{width:100%;padding:11px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:3px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
    input:focus,select:focus{border-color:var(--gold)}
    select option{background:#111;color:var(--white)}
    .phone-row{display:flex;gap:8px}
    .phone-code{width:130px;flex-shrink:0}
    .currency-note{background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.18);border-radius:3px;padding:8px 12px;margin-bottom:14px;font-size:0.74rem;color:var(--gold-light);display:none}
    .btn-submit{width:100%;padding:13px;background:var(--gold);color:var(--black);border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background 0.2s;margin-top:6px}
    .btn-submit:hover{background:var(--gold-light)}
    .signin-link{text-align:center;margin-top:18px;font-size:0.76rem;color:rgba(247,243,238,0.42)}
    .signin-link a{color:var(--gold);text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo-wrap">
    <div class="logo-em">AG</div>
    <span class="logo-name">Afrique Guide</span>
  </a>
  <h1>Create Account</h1>
  <p class="subtitle">Join East Africa's premier brand rating community</p>
  <div class="bonus-banner">
    <div class="bonus-label">New Member Welcome Bonus</div>
    <div class="bonus-amount" id="bonusDisplay">KES 200</div>
    <div class="bonus-note">Credited instantly on signup — no deposit required</div>
  </div>
  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="fullName" placeholder="Your full name"/>
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com"/>
  </div>
  <div class="form-group">
    <label>Country</label>
    <select id="countrySelect" onchange="updateCountry()">
      <option value="">Select your country</option>
      <option value="KE">🇰🇪 Kenya</option>
      <option value="TZ">🇹🇿 Tanzania</option>
      <option value="UG">🇺🇬 Uganda</option>
    </select>
  </div>
  <div class="currency-note" id="currencyNote"></div>
  <div class="form-group">
    <label>Phone Number</label>
    <div class="phone-row">
      <select class="phone-code" id="phoneCode">
        <option value="+254">🇰🇪 +254</option>
        <option value="+255">🇹🇿 +255</option>
        <option value="+256">🇺🇬 +256</option>
      </select>
      <input type="tel" id="phone" placeholder="7XX XXX XXX"/>
    </div>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Create a strong password"/>
  </div>
  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat your password"/>
  </div>
  <button class="btn-submit" onclick="handleSignup()">Create Account & Claim Bonus</button>
  <div class="signin-link">Already have an account? <a href="signin.html">Sign In</a></div>
</div>
<script>
const countries = {
  KE:{name:'Kenya',currency:'KES',code:'+254',bonus:200,symbol:'KES',pay:'M-Pesa'},
  TZ:{name:'Tanzania',currency:'TZS',code:'+255',bonus:4800,symbol:'TZS',pay:'M-Pesa'},
  UG:{name:'Uganda',currency:'UGX',code:'+256',bonus:7200,symbol:'UGX',pay:'MTN MoMo / Airtel Money'},
};
function updateCountry(){
  const code = document.getElementById('countrySelect').value;
  const note = document.getElementById('currencyNote');
  const bd = document.getElementById('bonusDisplay');
  const pc = document.getElementById('phoneCode');
  if(!code){note.style.display='none';return}
  const c = countries[code];
  note.style.display='block';
  note.textContent = `Your account will use ${c.currency} — Welcome bonus: ${c.symbol} ${c.bonus.toLocaleString()} — Withdraw via ${c.pay}`;
  bd.textContent = `${c.symbol} ${c.bonus.toLocaleString()}`;
  for(let i=0;i<pc.options.length;i++){if(pc.options[i].value===c.code){pc.selectedIndex=i;break}}
}
function handleSignup(){
  const name=document.getElementById('fullName').value.trim();
  const email=document.getElementById('email').value.trim();
  const country=document.getElementById('countrySelect').value;
  const phone=document.getElementById('phone').value.trim();
  const pwd=document.getElementById('password').value;
  const cpwd=document.getElementById('confirmPassword').value;
  if(!name||!email||!country||!phone||!pwd){alert('Please fill in all fields.');return}
  if(pwd!==cpwd){alert('Passwords do not match.');return}
  const c=countries[country];
  const userData={name,email,country,phone:document.getElementById('phoneCode').value+phone,currency:c.currency,symbol:c.symbol,bonus:c.bonus,balance:0,earnings:0,bonusRemaining:c.bonus,bonusUsed:0,tasksCompleted:0,joinedAt:new Date().toISOString(),lastSeen:new Date().toISOString()};
  // Save user
  localStorage.setItem('ag_user',JSON.stringify(userData));
  localStorage.setItem('ag_logged_in','true');
  // Save to users list for admin
  const users = JSON.parse(localStorage.getItem('ag_users')||'[]');
  const existing = users.findIndex(u=>u.email===email);
  if(existing>=0) users[existing]={...userData};
  else users.push(userData);
  localStorage.setItem('ag_users',JSON.stringify(users));
  window.location.href='home.html';
}
</script>
</body>
</html>
