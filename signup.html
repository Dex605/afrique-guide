<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign Up — Global Brands</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-l:#E8C97A;--black:#04040A;--dark:#0A0A12;--cream:#EEE8DC;--muted:rgba(238,232,220,0.45);--border:rgba(201,168,76,0.15);--serif:'Playfair Display',serif;--sans:'Outfit',sans-serif}
html,body{height:100%}
body{font-family:var(--sans);background:var(--black);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow-x:hidden}
.bg-slide{position:fixed;inset:0;z-index:0}
.bg-overlay{position:fixed;inset:0;z-index:1;background:rgba(4,4,10,.38)}
.bg-grid{position:fixed;inset:0;z-index:2;pointer-events:none;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:80px 80px}
.card{position:relative;z-index:10;background:rgba(10,10,18,.92);border:1px solid var(--border);border-radius:8px;padding:40px 46px;width:100%;max-width:490px;backdrop-filter:blur(24px);margin:20px 0}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:28px}
.logo-globe{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.07)}
.logo-globe svg{width:18px;height:18px}
.logo-name{font-family:var(--serif);font-size:1rem;color:var(--cream);font-weight:700}
.logo-tag{font-size:.46rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
h1{font-family:var(--serif);font-size:2rem;font-weight:700;margin-bottom:4px}
.subtitle{font-size:.8rem;color:var(--muted);margin-bottom:26px;font-weight:300;line-height:1.6}
.form-group{margin-bottom:14px}
label{display:block;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(238,232,220,.4);margin-bottom:7px}
input,select{width:100%;padding:11px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:3px;color:var(--cream);font-family:var(--sans);font-size:.87rem;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--gold)}
select option{background:#111;color:var(--cream)}
.phone-row{display:flex;gap:8px}
.phone-code{width:136px;flex-shrink:0}
.currency-note{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:3px;padding:8px 12px;margin-bottom:12px;font-size:.72rem;color:var(--gold-l);line-height:1.5;display:none}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(238,232,220,.35);transition:color .2s;padding:4px;display:flex;align-items:center}
.pw-toggle:hover{color:var(--gold)}
.btn-submit{width:100%;padding:13px;background:var(--gold);color:var(--black);border:none;border-radius:3px;font-family:var(--sans);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .2s;margin-top:6px}
.btn-submit:hover{background:var(--gold-l)}
.btn-submit:disabled{background:rgba(201,168,76,.4);cursor:not-allowed}
.alt-link{text-align:center;margin-top:18px;font-size:.76rem;color:var(--muted)}
.alt-link a{color:var(--gold);text-decoration:none}
.err{background:rgba(180,30,30,.15);border:1px solid rgba(180,30,30,.35);border-radius:3px;padding:9px 13px;font-size:.76rem;color:#ff8a8a;margin-bottom:14px;display:none}
  </style>
</head>
<body>
<div class="bg-slide" id="bgSlide"></div>
<div class="bg-overlay"></div>
<div class="bg-grid"></div>
<div class="card">
  <a href="index.html" class="logo-wrap">
    <div class="logo-globe"><svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="4.5" ry="10"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="17" x2="20" y2="17"/></svg></div>
    <div><div class="logo-name">Global Brands</div><div class="logo-tag">Rate the World's Greatest</div></div>
  </a>
  <h1>Create Account</h1>

  <div class="form-group">

      </optgroup>

      </optgroup>
    </select>
  </div>
  <div class="currency-note" id="currencyNote"></div>
  <div class="form-group">
    <label>Year of Birth</label>
    <select id="yearOfBirth"><option value="">Select year of birth</option></select>
  </div>
  <div class="form-group">
    <label>Phone Number</label>
    <div class="phone-row">
      <select id="phoneCode">
        <option value="+254">🇰🇪 +254</option><option value="+234">🇳🇬 +234</option><option value="+27">🇿🇦 +27</option><option value="+233">🇬🇭 +233</option><option value="+255">🇹🇿 +255</option><option value="+256">🇺🇬 +256</option><option value="+251">🇪🇹 +251</option><option value="+250">🇷🇼 +250</option><option value="+20">🇪🇬 +20</option><option value="+212">🇲🇦 +212</option><option value="+44">🇬🇧 +44</option><option value="+49">🇩🇪 +49</option><option value="+33">🇫🇷 +33</option><option value="+1">🇺🇸 +1</option><option value="+61">🇦🇺 +61</option><option value="+91">🇮🇳 +91</option><option value="+86">🇨🇳 +86</option><option value="+81">🇯🇵 +81</option><option value="+966">🇸🇦 +966</option><option value="+971">🇦🇪 +971</option><option value="+55">🇧🇷 +55</option><option value="+52">🇲🇽 +52</option>
      </select>
      <input type="tel" id="phone" placeholder="Phone number"/>
    </div>
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Create a strong password"/>
      <button class="pw-toggle" type="button" onclick="togglePw('password','eyePw1')">
        <svg id="eyePw1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <div class="form-group">
    <label>Confirm Password</label>
    <div class="pw-wrap">
      <input type="password" id="confirmPassword" placeholder="Repeat your password"/>
      <button class="pw-toggle" type="button" onclick="togglePw('confirmPassword','eyePw2')">
        <svg id="eyePw2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <div class="form-group" style="margin-bottom:18px">
    <label>Invitation Code <span style="color:#ff6b6b">*</span></label>
    <input type="text" id="inviteInput" placeholder="Enter your invitation code" style="text-transform:uppercase;letter-spacing:.1em" oninput="this.value=this.value.toUpperCase()"/>
    <div style="font-size:.62rem;color:rgba(242,237,228,.35);margin-top:5px">Required to create an account. Contact support if you need one.</div>
  </div>
  <button class="btn-submit" id="submitBtn" onclick="handleSignup()">Create Account</button>
  <div class="alt-link">Already have an account? <a href="signin.html">Sign In</a></div>
</div>

<script src="brands.js"></script>
<script src="gb_shared.js"></script>
<script src="supabase.js"></script>
<script>
// Populate year dropdown

const curY=new Date().getFullYear()-18;
for(let y=curY;y>=1935;y--){const o=document.createElement('option');o.value=y;o.textContent=y;yb.appendChild(o);}

const countries={

  NG:{currency:'NGN',code:'+234',bonus:1800,symbol:'NGN',pay:'Bank Transfer and Wallet'},

  GB:{currency:'GBP',code:'+44',bonus:4,symbol:'£',pay:'Bank Transfer and Wallet'},

  RU:{currency:'RUB',code:'+7',bonus:460,symbol:'RUB',pay:'Bank Transfer and Wallet'},

  JP:{currency:'JPY',code:'+81',bonus:730,symbol:'JPY',pay:'Bank Transfer and Wallet'},
  IN:{currency:'INR',code:'+91',bonus:415,symbol:'INR',pay:'UPI and Wallet'},
  KR:{currency:'KRW',code:'+82',bonus:6700,symbol:'KRW',pay:'Bank Transfer and Wallet'},
  ID:{currency:'IDR',code:'+62',bonus:78000,symbol:'IDR',pay:'GoPay and Wallet'},
  PH:{currency:'PHP',code:'+63',bonus:280,symbol:'PHP',pay:'GCash and Wallet'},
  VN:{currency:'VND',code:'+84',bonus:124000,symbol:'VND',pay:'MoMo and Wallet'},
  TH:{currency:'THB',code:'+66',bonus:180,symbol:'THB',pay:'PromptPay and Wallet'},

function updateCountry(){
  const c=countries[document.getElementById('countrySelect').value];
  const note=document.getElementById('currencyNote');
  if(!c){note.style.display='none';return}
  note.style.display='block';
  note.textContent='Account currency: '+c.currency+' · Withdraw via: '+c.pay;
  const pc=document.getElementById('phoneCode');
  for(let i=0;i<pc.options.length;i++){if(pc.options[i].value===c.code){pc.selectedIndex=i;break}}
}

function togglePw(inputId,iconId){
  const inp=document.getElementById(inputId),ico=document.getElementById(iconId);
  if(inp.type==='password'){inp.type='text';ico.innerHTML=`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;}
  else{inp.type='password';ico.innerHTML=`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;}
}

// ── VALID INVITATION CODES ──
const VALID_INVITE_CODES = ['GB-ALPHA7','GB-BRAVO3','GB-DELTA9','GB-ECHO42','GB-ZETA88'];

async function handleSignup(){
  const name=document.getElementById('fullName').value.trim();
  const email=document.getElementById('email').value.trim();
  const countryCode=document.getElementById('countrySelect').value;
  const yearOfBirth=document.getElementById('yearOfBirth').value;
  const phone=document.getElementById('phoneCode').value+document.getElementById('phone').value.trim();
  const pwd=document.getElementById('password').value;
  const cpwd=document.getElementById('confirmPassword').value;
  const enteredCode=document.getElementById('inviteInput').value.trim().toUpperCase();
  const errEl=document.getElementById('errMsg');
  errEl.style.display='none';
  if(!name||!email||!countryCode||!yearOfBirth||!phone||!pwd){errEl.textContent='Please fill in all fields.';errEl.style.display='block';return;}
  if(pwd!==cpwd){errEl.textContent='Passwords do not match.';errEl.style.display='block';return;}
  if(!enteredCode){errEl.textContent='Please enter an invitation code.';errEl.style.display='block';return;}
  if(!VALID_INVITE_CODES.includes(enteredCode)){errEl.textContent='Invalid invitation code. Please check and try again.';errEl.style.display='block';return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='Creating account...';
  // Check if email exists
  const existing=await sb.getUser(email);
  if(existing){errEl.textContent='An account with this email already exists.';errEl.style.display='block';btn.disabled=false;btn.textContent='Create Account';return;}
  const c=countries[countryCode]||{currency:'USD',symbol:'$',bonus:5};
  const inviteCode=gbGenInviteCode();
  const country=document.getElementById('countrySelect').value;
  const av=gbGenAvatar(name,Math.floor(Math.random()*10),country);
  const user={
    email,name,phone,country:countryCode,year_of_birth:yearOfBirth,
    currency:c.currency,symbol:c.symbol,bonus:c.bonus,
    earnings:0,bonus_remaining:c.bonus,bonus_used:0,tasks_completed:0,
    invite_code:inviteCode,avatar:av.svg,avatar_color:av.color,avatar_initials:av.initials,
    password_hash:btoa(pwd),
    pending_deposit:0,pending_withdrawal:0,special_blocked:{},
    joined_at:new Date().toISOString(),last_seen:new Date().toISOString()
  };
  const created=await sb.createUser(user);
  if(!created||created.code){errEl.textContent='Error creating account. Please try again.';errEl.style.display='block';btn.disabled=false;btn.textContent='Create Account';return;}
  localStorage.setItem('gb_user',JSON.stringify({...user,...created}));
  localStorage.setItem('gb_login','true');
  await sb.addTransaction({user_email:email,type:'bonus',label:'Welcome Bonus',amount:c.bonus,status:'completed'});
  window.location.href='home.html';
}

// Background slideshow
const bgSlide=document.getElementById('bgSlide');
const positions=[{top:'4%',left:'2%',w:'250px',h:'170px'},{top:'4%',right:'2%',w:'240px',h:'160px'},{top:'38%',left:'0%',w:'210px',h:'145px'},{top:'38%',right:'0%',w:'210px',h:'145px'},{bottom:'6%',left:'6%',w:'200px',h:'138px'},{bottom:'6%',right:'6%',w:'200px',h:'138px'},{top:'2%',left:'44%',w:'220px',h:'150px'},{bottom:'5%',left:'36%',w:'190px',h:'130px'}];
const bgImgs=positions.map(p=>{const img=document.createElement('img');let s=`position:absolute;object-fit:contain;pointer-events:none;filter:blur(5px) brightness(.65) saturate(1.6);transition:opacity 1.4s ease;opacity:0;width:${p.w};height:${p.h};`;if(p.top)s+=`top:${p.top};`;if(p.bottom)s+=`bottom:${p.bottom};`;if(p.left)s+=`left:${p.left};`;if(p.right)s+=`right:${p.right};`;img.style.cssText=s;bgSlide.appendChild(img);return img;});
function setBgBrands(){const shuffled=[...BRANDS].sort(()=>Math.random()-.5).slice(0,bgImgs.length);shuffled.forEach((b,i)=>{bgImgs[i].src=b.logo;bgImgs[i].onerror=function(){logoFail(this,b.fallback,b.color,b.initials);}});}
setBgBrands();setTimeout(()=>bgImgs.forEach(img=>img.style.opacity='1'),300);
setInterval(()=>{bgImgs.forEach(img=>img.style.opacity='0');setTimeout(()=>{setBgBrands();bgImgs.forEach(img=>img.style.opacity='1');},1500);},5000);
</script>

</html>
